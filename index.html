 .field {
  position: relative;
  padding-top: 0.5rem;

.field input,
.field textarea {
  width: 100%;
  border: none;
  border-bottom: 1.5px solid #c8c8c8;
  background: transparent;
  font-family: inherit;
  font-size: 1rem;        /* explicit size prevents iOS auto-zoom on focus */
  font-weight: 500;
  color: #1a1a1a;
  padding: 0.6rem 0;
  outline: none;
  border-radius: 0;                /* Safari adds rounded corners by default */
  -webkit-appearance: none;        /* strip Safari's native input chrome */
  appearance: none;
  transition: border-color 0.3s ease;
}

/* vendor-prefixed + standard placeholder reset */
.field input::-webkit-input-placeholder { color: transparent; }
.field input::placeholder             { color: transparent; }
.field textarea::-webkit-input-placeholder { color: transparent; }
.field textarea::placeholder             { color: transparent; }

.field.wide label { top: 1rem; }

.field label {
  position: absolute;
  left: 0;
  top: 50%;
  font-size: 0.85rem;
  font-weight: 500;
  text-transform: uppercase;
  color: #aaa;
  pointer-events: none;
  -webkit-transform-origin: left center;
  transform-origin: left center;
  transition:
    top 0.25s cubic-bezier(0.4, 0, 0.2, 1),
    font-size 0.25s cubic-bezier(0.4, 0, 0.2, 1),
    color 0.25s ease;
}

/* ── active / filled state ── */
.field input:focus ~ label,
.field input:not(:placeholder-shown) ~ label,
.field textarea:focus ~ label,
.field textarea:not(:placeholder-shown) ~ label {
  top: 0;
  font-size: 0.6rem;
  color: #999;
}

.field input:focus,
.field textarea:focus {
  border-bottom-color: #1a1a1a;
}
  
.circle-wrap div {
    position: absolute;
    text-transform: uppercase;
    white-space: nowrap;
  }
 
  /* ── position each label on the ellipse ── */
 
  /* top-left — BEAUTY */
  .circle-wrap div:nth-child(1) {
    top: 8%;
    left: 10%;
    transform: rotate(-55deg);
  }
 
  /* top-right — FAMILY */
  .circle-wrap div:nth-child(2) {
    top: 6%;
    right: 8%;
    transform: rotate(45deg);
  }
 
  /* mid-left — CINEMATOGRAPHY */
  .circle-wrap div:nth-child(3) {
    top: 50%;
    left: -1%;
    transform: translateY(-50%) rotate(-90deg);
  }
 
  /* mid-right — ADVERTISING */
  .circle-wrap div:nth-child(4) {
    top: 50%;
    right: -1%;
    transform: translateY(-50%) rotate(90deg);
  }
 
  /* bottom-left — FASHION */
  .circle-wrap div:nth-child(5) {
    bottom: 6%;
    left: 8%;
    transform: rotate(-135deg);
  }
 
  /* bottom-right — WEDDINGS */
  .circle-wrap div:nth-child(6) {
    bottom: 6%;
    right: 6%;
    transform: rotate(135deg);
  }

  :root {
    --not-found-paper: #f6f1eb;
    --not-found-dark: #ada59c;
    --not-found-light: #f6f1eb;
    --not-found-dark-ink: rgba(10, 10, 10, 0.98);
    --not-found-light-ink: rgba(10, 10, 10, 0.98);
}


body:has([data-namespace='notFound']){
  --page-bg: var(--not-found-dark);
    --page-text: var(--not-found-dark-ink);
    --page-link: rgba(10, 10, 10, 0.78);
    margin: 0;
    min-height: 100svh;
    overflow: hidden;
    color: var(--page-text);
    background: var(--page-bg);
}


.not-found-shell {
    min-height: 100svh;
    display: grid;
    place-items: center;
    padding: 2rem;
}

.not-found {
    display: grid;
    justify-items: center;
    gap: 1.6rem;
    transform: translateY(1.5vh);
}

.not-found__code {
    display: inline-flex;
    align-items: center;
    gap: 0;
    font-size: 18rem;
    font-weight: 400;
    letter-spacing: -0.08em;
    line-height: 0.84;
}

.not-found__digit {
    display: block;
}

.not-found__digit--clock {
    position: relative;
    display: grid;
    place-items: center;
    width: 0.82em;
    height: 1em;
    margin-inline: -0.05em;
}

.not-found__zero {
    position: relative;
    z-index: 1;
}

.not-found__clock {
    position: absolute;
    z-index: 2;
    width: 0.34em;
    height: 0.34em;
    border-radius: 50%;
    transform: translate(0.022em, 0.03em);
}

.not-found__hand {
    position: absolute;
    left: 50%;
    top: 50%;
    height: 0.006em;
    border-radius: 999px;
    background: currentColor;
    transform-origin: 0 50%;
    translate: 0 -50%;
}

.not-found__hand--hour {
    width: 0.125em;
    transform: rotate(32deg);
}

.not-found__hand--minute {
    width: 0.19em;
    transform: rotate(-66deg);
}

.not-found__message {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1;
}

.not-found__link {
    color: var(--page-link);
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: -0.03em;
    text-underline-offset: 0.22em;
    text-decoration-thickness: 0.05em;
}

.not-found__link:hover,
.not-found__link:focus-visible {
    outline: none;
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

    .not-found__code {
        gap: 0.18rem;

    }

        /*font-size: 1.55rem;*/
    }
}

}

  
:root {

    --counter-glaze: rgba(255, 255, 255, 0.92);
    --counter-digit-size: 1.2rem;
    --counter-digit-step: 0.85rem;
}

.number-counter__viewport {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 0em;
    line-height: 1;
    isolation: isolate;
}

@media (min-width: 640px) {

.number-counter__viewport::before,
.number-counter__viewport::after {
    content: "";
    position: absolute;
    left: -0.4em;
    right: -0.4em;
    height: 0.5em;
    pointer-events: none;
    z-index: 2;
}

.number-counter__viewport::before {
    top: -0.2em;
    background: linear-gradient(180deg, var(--counter-paper) 0%, rgba(244, 242, 239, 0) 100%);
}

.number-counter__viewport::after {
    bottom: -0.2em;
    background: linear-gradient(0deg, var(--counter-paper) 0%, rgba(244, 242, 239, 0) 100%);
}

  .number-counter__digit::before,

    z-index: 3;

.number-counter__digit::before {
    top: 0;
